<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShiftWords</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f0f1a; color: #e8e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; max-width: 560px; width: 100%; padding: 3rem 2.5rem; text-align: center; }
    h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; color: #ffffff; margin-bottom: 0.4rem; }
    .tagline { font-size: 1.1rem; color: #8888aa; margin-bottom: 2rem; }
    p { line-height: 1.7; color: #b0b0cc; margin-bottom: 1.5rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem; }
    a { color: #7b7bff; text-decoration: none; font-size: 0.95rem; }
    a:hover { text-decoration: underline; }
    .badge { display: inline-block; background: #2a2a4a; border-radius: 8px; padding: 0.5rem 1.1rem; font-size: 0.9rem; color: #aaaacc; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ShiftWords</h1>
    <p class="tagline">A word scramble puzzle game for Android</p>
    <p>
      Unscramble letters, solve puzzles, climb the leaderboards, and challenge your friends.
      ShiftWords is a free word game built for casual play and competitive fun.
    </p>
    <div class="links">
      <span class="badge">Available on Android</span>
    </div>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
  </div>
</body>
</html>
